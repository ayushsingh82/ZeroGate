<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Stealth402">
  <defs>
    <filter id="g">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#0a0a0a"/>

  <!-- Lock shackle -->
  <path d="M21 31 V22 C21 12 43 12 43 22 V31"
        fill="none" stroke="#CFFF03" stroke-width="3" stroke-linecap="round"
        filter="url(#g)"/>

  <!-- Lock body -->
  <rect x="14" y="31" width="36" height="22" rx="6"
        fill="none" stroke="#CFFF03" stroke-width="2.5"
        filter="url(#g)"/>

  <!-- Keyhole -->
  <circle cx="32" cy="40" r="3.5" fill="#CFFF03"/>
  <rect x="30.5" y="42.5" width="3" height="5" rx="1" fill="#CFFF03"/>
</svg>
