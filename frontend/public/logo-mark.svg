<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Stealth402">
  <defs>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#CFFF03" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#CFFF03" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="13" fill="#0a0a0a"/>
  <rect x="1" y="1" width="62" height="62" rx="12" fill="none" stroke="#CFFF03" stroke-opacity="0.15" stroke-width="1"/>

  <!-- Shield fill -->
  <path d="M32 9 L53 18 L53 35 C53 47 32 55 32 55 C32 55 11 47 11 35 L11 18 Z"
        fill="url(#shieldGrad)"/>

  <!-- Shield outline -->
  <path d="M32 9 L53 18 L53 35 C53 47 32 55 32 55 C32 55 11 47 11 35 L11 18 Z"
        fill="none" stroke="#CFFF03" stroke-width="2" stroke-linejoin="round"
        filter="url(#glow)"/>

  <!-- ZK circuit trace: three nodes with lines -->
  <!-- Node left -->
  <circle cx="21" cy="32" r="3" fill="#CFFF03" filter="url(#glow)"/>
  <!-- Node center top -->
  <circle cx="32" cy="25" r="2.5" fill="#CFFF03" filter="url(#glow)"/>
  <!-- Node right -->
  <circle cx="43" cy="32" r="3" fill="#CFFF03" filter="url(#glow)"/>
  <!-- Node center bottom -->
  <circle cx="32" cy="41" r="2" fill="#0a0a0a" stroke="#CFFF03" stroke-width="1.5"/>

  <!-- Circuit edges -->
  <line x1="21" y1="32" x2="32" y2="25" stroke="#CFFF03" stroke-width="1.5" stroke-opacity="0.9" filter="url(#glow)"/>
  <line x1="32" y1="25" x2="43" y2="32" stroke="#CFFF03" stroke-width="1.5" stroke-opacity="0.9" filter="url(#glow)"/>
  <line x1="21" y1="32" x2="32" y2="41" stroke="#CFFF03" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="43" y1="32" x2="32" y2="41" stroke="#CFFF03" stroke-width="1.5" stroke-opacity="0.6"/>
</svg>
