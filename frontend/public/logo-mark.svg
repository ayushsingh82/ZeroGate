<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="FlowPay">
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#080808"/>

  <!-- Subtle border -->
  <rect x="1" y="1" width="62" height="62" rx="13" fill="none" stroke="#CFFF03" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Glow layer -->
  <path
    d="M 32 32 C 30 20 7 20 7 32 C 7 44 30 44 32 32 C 34 20 57 20 57 32 C 57 44 34 44 32 32 Z"
    fill="none" stroke="#CFFF03" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"
    stroke-opacity="0.25" filter="url(#glow)"
  />

  <!-- Main infinity mark -->
  <path
    d="M 32 32 C 30 20 7 20 7 32 C 7 44 30 44 32 32 C 34 20 57 20 57 32 C 57 44 34 44 32 32 Z"
    fill="none" stroke="#CFFF03" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"
  />
</svg>
